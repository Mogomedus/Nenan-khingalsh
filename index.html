<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ненан Хингалш</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>Ненан Хингалш</h1>
</header>


<section class="hero">

<h2>Свежие Хингалш и Ч1епалгш</h2>
<p>Домашняя выпечка</p>

<button id="orderBtn" onclick="openOrder()">Заказать</button>

</section>


<section class="foods">

<div class="food">
<img src="khingalsh.jpg">
<h3>Хингалш</h3>
<p>150₽</p>
</div>

<div class="food">
<img src="chepalgsh.jpg">
<h3>Ч1епалгш</h3>
<p>150₽</p>
</div>

</section>


<!-- ОКНО ЗАКАЗА -->

<div class="overlay" id="orderOverlay">

<div class="modal orderModal">

<h2>Сделать заказ</h2>

<!-- ХИНГАЛШ -->
<div class="product">

<div class="productTitle">Хингалш</div>

<div class="controls">

<button onclick="changeQty('hingalshQty',-10)">−10</button>
<button onclick="changeQty('hingalshQty',-1)">−</button>

<input id="hingalshQty" type="number" value="0" min="0">

<button onclick="changeQty('hingalshQty',1)">+</button>
<button onclick="changeQty('hingalshQty',10)">+10</button>

<label>
<input type="checkbox" id="thymeCheck">
с чебрецом
</label>

</div>

</div>

<!-- Ч1ЕПАЛГШ -->
<div class="product">

<div class="productTitle">Ч1епалгш</div>

<div class="controls">

<button onclick="changeQty('chepQty',-10)">−10</button>
<button onclick="changeQty('chepQty',-1)">−</button>

<input id="chepQty" type="number" value="0" min="0">

<button onclick="changeQty('chepQty',1)">+</button>
<button onclick="changeQty('chepQty',10)">+10</button>

<label>
<input type="checkbox" id="onionCheck">
с луком
</label>

</div>

</div>

<!-- РЕЗАТЬ -->
<div class="cutBox">
<label><input type="radio" name="cutOption" value="резать"> резать</label>
<label><input type="radio" name="cutOption" value="не резать"> не резать</label>
</div>

<!-- ОПЛАТА -->
<div class="payBox">
<p>Оплата:</p>
<label><input type="radio" name="payMethod" value="наличными"> наличными</label>
<label><input type="radio" name="payMethod" value="переводом"> переводом</label>
</div>

<!-- ДОСТАВКА -->
<div class="deliveryBox">
<p>Способ получения:</p>
<label><input type="radio" name="deliveryType" value="самовывоз"> самовывоз</label>
<label><input type="radio" name="deliveryType" value="доставка"> доставка</label>
</div>

<input id="addressInput" placeholder="Введите адрес доставки">

<!-- ПРЕДПРОСМОТР -->
<div class="previewBox">

<div class="previewHeader" onclick="togglePreview()">
Ваш заказ ▼
</div>

<div id="previewContent">Ничего не выбрано</div>

</div>

<textarea id="wishInput" placeholder="Ваши пожелания"></textarea>

<div id="priceBlock">Цена: 0₽</div>

<button id="orderSubmit" class="orderSend" disabled onclick="submitOrder()">
Заказать
</button>

<button class="close" onclick="closeAll()">✕</button>

</div>

</div>


<script src="script.js"></script>

</body>
</html>
